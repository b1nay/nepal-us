<!DOCTYPE html>
<html>
  <body>
    <label>
      <input type="checkbox" id="toggle" />
      Enable Base Mode
    </label>

    <br /><br />

    <label>
      <input type="checkbox" id="highlightToggle" />
      Enable Letter Highlight
    </label>

    <br /><br />

    <label>Background:</label>
    <input type="color" id="bgColor" value="#E1F5EE" />

    <br /><br />

    <label>Letter Spacing:</label>
    <input type="range" id="spacing" min="0" max="5" step="0.5" />

    <script src="popup.js"></script>
  </body>
</html>
